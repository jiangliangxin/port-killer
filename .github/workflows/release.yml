name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  portable-windows:
    name: Build portable Windows exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable pnpm
        shell: pwsh
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portable release
        run: pnpm release

      - name: Verify release files
        shell: pwsh
        run: |
          $exe = "release/port-killer.exe"
          $hash = "release/port-killer.sha256.txt"
          if (-not (Test-Path -LiteralPath $exe)) { throw "Missing $exe" }
          if (-not (Test-Path -LiteralPath $hash)) { throw "Missing $hash" }

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          gh release create $tag `
            --title $tag `
            --notes "Portable Windows release." `
            "release/port-killer.exe" `
            "release/port-killer.sha256.txt"
